<!DOCTYPE html>

<html>

<head>
<title>DPC Home Portal</title>
<link rel="icon" type="image/png" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#eef2f6;
color:#222;
}

/* HEADER */

header{
background:#1f3a5f;
color:white;
padding:18px 25px;
display:grid;
grid-template-columns:80px 1fr 80px;
align-items:center;
position:sticky;
top:0;
z-index:1100;
}

header img{
height:55px;
}

.header-text h1{
margin:0;
font-size:26px;
}

.header-text p{
margin-top:6px;
font-size:13px;
opacity:0.9;
}

/* NAV MENU */

.menu{
display:flex;
justify-content:center;
gap:15px;
padding:14px;
background:white;
position:sticky;
top:101px;
z-index:1000;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.menu a{
background:#1f3a5f;
color:white;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
transition:0.2s;
}

.menu a:hover{
background:#2f5f9c;
}

.menu a.active{
background:#7198cc;
box-shadow:0 0 0 2px rgba(0,0,0,0.1) inset;
}

/* HERO */

.hero{
background:white;
margin:25px auto 10px auto;
padding:30px;
max-width:1200px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
text-align:center;
}

.hero h2{
margin-top:0;
color:#1f3a5f;
font-size:26px;
}

.hero p{
font-size:15px;
color:#555;
}

/* ALERT BOX */

.alert-box{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#fff3cd;
border-left:6px solid #e0a800;
border-radius:8px;
font-size:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
text-align:center;
}

.alert-title{
font-weight:bold;
font-size:17px;
margin-bottom:10px;
}

/* SECTION TITLE */

.section-title{
max-width:1200px;
margin:40px auto 10px auto;
text-align:center;
padding:0 20px;
}

.section-title h2{
margin:0;
font-size:28px;
color:#1f3a5f;
}

.section-title p{
margin-top:8px;
color:#555;
font-size:15px;
}

/* INFORMATION GRID */

.info-grid{
max-width:1200px;
margin:25px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:0 20px;
}

/* CARD STYLE */

.card{
background:white;
padding:24px;
border-radius:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
transition:0.25s;
border-top:5px solid #1f3a5f;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 18px rgba(0,0,0,0.12);
}

.card h3{
margin-top:0;
margin-bottom:10px;
font-size:18px;
color:#1f3a5f;
}

.card ul{
padding-left:18px;
line-height:1.6;
color:#444;
}

.card li{
margin-bottom:6px;
}

/* MAP SECTION */

.map-box{
max-width:1200px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
text-align:center;
}

.map-box h2{
color:#1f3a5f;
margin-top:0;
}

.map-box img{
width:100%;
border-radius:8px;
cursor:pointer;
}

.map-button{
background:#2e7d32;
color:white;
padding:14px 22px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
display:inline-block;
margin-top:15px;
}

/* FULLSCREEN MAP */

.map-popup{
display:none;
position:fixed;
z-index:2000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.map-popup img{
max-width:95%;
max-height:95%;
border-radius:8px;
box-shadow:0 0 20px black;
}

.close-map{
position:absolute;
top:25px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
font-weight:bold;
}

/* CONTACT BOX */

.contact-box{
background:#1f3a5f;
color:white;
padding:22px;
border-radius:10px;
margin:30px auto;
max-width:1200px;
text-align:center;
}

.contact-box h3{
margin-top:0;
}

.contact-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:gray;
padding:25px;
}

/* MOBILE */

@media (max-width:768px){

header{
grid-template-columns:60px 1fr;
text-align:center;
}

header img{
height:45px;
}

.menu{
flex-wrap:nowrap;
gap:20px;
}

.menu a{
padding:8px 12px;
font-size:14px;
}

.hero{
margin:15px;
padding:20px;
}

.hero h2{
font-size:22px;
}

.alert-box{
margin:15px;
}

.info-grid{
grid-template-columns:1fr;
}

.card{
padding:20px;
}

.section-title h2{
font-size:24px;
}

/* HAMBURGER MENU */

.hamburger{
display:none;
font-size:28px;
cursor:pointer;
color:#1f3a5f;
font-weight:bold;
}

.menu-links{
display:flex;
gap:15px;
}

/* MOBILE MENU */

.hamburger{
display:block;
}

.menu{
flex-direction:column;
align-items:center;
position:sticky;
top:101px;
z-index:1000;
}

.menu-links{
display:none;
flex-direction:column;
align-items:center;
width:100%;
}

.menu-links a{
width:80%;
text-align:center;
}

.menu-links.show{
display:flex;
}

}

</style>

</head>

<body>

<header>

<div>
<img src="logo.png" alt="Unit Logo">
</div>

<div class="header-text" style="text-align:center">
<h1>Deployment Processing Center</h1>
<p>Supported by 21st Theater Sustainment Command</p>
</div>

<div></div>

</header>

<div class="menu">

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div class="menu-links">
<a href="index.html">Home</a>
<a href="mayorcell.html">Mayor Cell</a>
<a href="transportation.html">Transportation</a>
<a href="services.html">Services</a>
<a href="#" onclick="openMap()">DPC Map</a>
</div>

</div>

<!-- MAP POPUP -->

<div id="mapPopup" class="map-popup">
<span class="close-map" onclick="closeMap()">&times;</span>
<img src="dpc-map.png" alt="Full Map">
</div>

<script>

function openMap(){
document.getElementById("mapPopup").style.display="flex";
}

function closeMap(){
document.getElementById("mapPopup").style.display="none";
}

function toggleMenu(){
document.querySelector(".menu-links").classList.toggle("show");
}

const currentPage = window.location.pathname.split("/").pop();
const menuLinks = document.querySelectorAll(".menu-links a");

menuLinks.forEach(link => {
if(link.getAttribute("href") === currentPage){
link.classList.add("active");
}
});

</script>

</body>
</html>
